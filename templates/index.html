<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>Persian LLM</title>

    <style>

        body{
            margin:0;
            background:#212121;
            color:white;
            font-family:tahoma;
            display:flex;
            flex-direction:column;
            height:100vh;
        }

        .header{
            padding:20px;
            border-bottom:1px solid #333;
            font-size:20px;
            font-weight:bold;
        }

        .chat-container{
            flex:1;
            overflow-y:auto;
            padding:20px;
            display:flex;
            flex-direction:column;
            gap:20px;
        }

        .message{
            max-width:80%;
            padding:15px;
            border-radius:15px;
            line-height:1.8;
            white-space:pre-wrap;
        }

        .user{
            align-self:flex-end;
            background:#0b93f6;
        }

        .bot{
            align-self:flex-start;
            background:#2f2f2f;
        }

        .input-container{
            display:flex;
            padding:20px;
            border-top:1px solid #333;
            gap:10px;
        }

        input{
            flex:1;
            padding:15px;
            border:none;
            border-radius:10px;
            background:#2f2f2f;
            color:white;
            font-size:16px;
        }

        button{
            padding:15px 25px;
            border:none;
            border-radius:10px;
            background:#19c37d;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="header">
        Persian LLM Chat
    </div>

    <div class="chat-container" id="chat"></div>

    <div class="input-container">

        <input
            type="text"
            id="message"
            placeholder="پیام خود را بنویسید..."
        >

        <button onclick="sendMessage()">
            ارسال
        </button>

    </div>

<script>

async function sendMessage(){

    const input = document.getElementById("message");

    const message = input.value;

    if(!message) return;

    addMessage(message,"user");

    input.value = "";

    const botDiv = addMessage("","bot");

    const response = await fetch("/chat",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            message:message
        })

    });

    const reader = response.body.getReader();

    const decoder = new TextDecoder();

    while(true){

        const {done,value} = await reader.read();

        if(done) break;

        const chunk = decoder.decode(value);

        botDiv.textContent += chunk;

        window.scrollTo(
            0,
            document.body.scrollHeight
        );
    }
}

function addMessage(text,type){

    const chat = document.getElementById("chat");

    const div = document.createElement("div");

    div.classList.add("message");

    div.classList.add(type);

    div.textContent = text;

    chat.appendChild(div);

    return div;
}

document
.getElementById("message")
.addEventListener("keypress",function(e){

    if(e.key==="Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
